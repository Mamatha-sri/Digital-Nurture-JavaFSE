<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Flexbox Navbar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .navbar-custom {
            background-color: #0d6efd;
            padding: 15px;
        }

        .nav-link-custom {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            font-weight: bold;
        }

        .nav-link-custom:hover {
            background-color: rgba(255,255,255,0.2);
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <!-- Responsive Flexbox Navbar -->
    <div class="navbar-custom">

        <div class="d-flex flex-column flex-md-row justify-content-center">

            <a href="#" class="nav-link-custom">Home</a>
            <a href="#" class="nav-link-custom">Events</a>
            <a href="#" class="nav-link-custom">Gallery</a>
            <a href="#" class="nav-link-custom">Contact</a>

        </div>

    </div>

</body>
</html>
