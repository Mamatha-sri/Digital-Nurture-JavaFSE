<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Pricing Section</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <h2 class="text-center text-primary mb-5">
        Membership Plans
    </h2>

    <div class="row g-4">

        <!-- Basic Plan -->
        <div class="col-md-4">
            <div class="card text-center p-4 shadow-sm h-100">
                <h3>Basic</h3>
                <h1 class="text-primary my-3">₹199</h1>
                <p class="mb-4">Access to community events.</p>
                <button class="btn btn-outline-primary">
                    Choose Plan
                </button>
            </div>
        </div>

        <!-- Standard Plan -->
        <div class="col-md-4">
            <div class="card text-center p-4 shadow h-100 border-primary">
                <h3>Standard</h3>
                <h1 class="text-success my-3">₹499</h1>
                <p class="mb-4">Events + Workshops access.</p>
                <button class="btn btn-success">
                    Choose Plan
                </button>
            </div>
        </div>

        <!-- Premium Plan -->
        <div class="col-md-4">
            <div class="card text-center p-4 shadow-sm h-100">
                <h3>Premium</h3>
                <h1 class="text-danger my-3">₹999</h1>
                <p class="mb-4">All events with VIP benefits.</p>
                <button class="btn btn-outline-danger">
                    Choose Plan
                </button>
            </div>
        </div>

    </div>

</div>

</body>
</html>
