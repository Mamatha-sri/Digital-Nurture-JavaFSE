<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Accordion</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center text-primary mb-4">
        Community Event FAQ
    </h2>

    <div class="accordion" id="eventAccordion">

        <!-- Item 1 -->
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#faq1">
                    What is the Community Event?
                </button>
            </h2>

            <div id="faq1"
                 class="accordion-collapse collapse show"
                 data-bs-parent="#eventAccordion">
                <div class="accordion-body">
                    The Community Event brings together residents for cultural,
                    educational, and recreational activities.
                </div>
            </div>
        </div>

        <!-- Item 2 -->
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#faq2">
                    How can I register?
                </button>
            </h2>

            <div id="faq2"
                 class="accordion-collapse collapse"
                 data-bs-parent="#eventAccordion">
                <div class="accordion-body">
                    You can register online through the Community Event Portal.
                </div>
            </div>
        </div>

        <!-- Item 3 -->
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#faq3">
                    Is participation free?
                </button>
            </h2>

            <div id="faq3"
                 class="accordion-collapse collapse"
                 data-bs-parent="#eventAccordion">
                <div class="accordion-body">
                    Yes, most community events are free to attend.
                </div>
            </div>
        </div>

    </div>

</div>

<!-- Bootstrap JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
