<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Button Groups</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center text-primary mb-4">
        Bootstrap Button Groups & Toggle Buttons
    </h2>

    <!-- Button Group -->
    <h4>Button Group</h4>

    <div class="btn-group mb-4" role="group">
        <button type="button" class="btn btn-primary">Home</button>
        <button type="button" class="btn btn-primary">Events</button>
        <button type="button" class="btn btn-primary">Contact</button>
    </div>

    <hr>

    <!-- Toggle Buttons -->
    <h4>Toggle Buttons (Checkboxes)</h4>

    <input type="checkbox" class="btn-check" id="music" autocomplete="off">
    <label class="btn btn-outline-success" for="music">
        Music
    </label>

    <input type="checkbox" class="btn-check" id="sports" autocomplete="off">
    <label class="btn btn-outline-primary" for="sports">
        Sports
    </label>

    <input type="checkbox" class="btn-check" id="art" autocomplete="off">
    <label class="btn btn-outline-danger" for="art">
        Art
    </label>

</div>

</body>
</html>
