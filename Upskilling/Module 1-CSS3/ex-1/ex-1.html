<!DOCTYPE html>
<html>
<head>
    <title>Local Community Event Portal</title>

    <!-- Internal CSS -->
    <style>

        /* =====================================
           Body Background Styling
        ===================================== */

        body {
            background-color: #f0f8ff;

            /* Community Event Background Image */
            background-image: url("https://images.unsplash.com/photo-1511578314322-379afb476865?q=80&w=1600&auto=format&fit=crop");

            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }


        /* =====================================
           Main Header Styling
        ===================================== */

        #mainHeader {
            background: linear-gradient(to right, navy, royalblue);
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            margin: 20px;
        }


        /* =====================================
           Event Card Styling
        ===================================== */

        .eventCard {
            background-color: rgba(255,255,255,0.9);
            border: 1px solid gray;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }


        /* =====================================
           Event Heading Styling
        ===================================== */

        .eventCard h3 {
            color: darkblue;
        }


        /* =====================================
           Event Description Styling
        ===================================== */

        .eventCard p {
            color: #444;
            line-height: 1.6;
        }


        /* =====================================
           Button Styling
        ===================================== */

        .btn {
            background-color: royalblue;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
        }


        /* =====================================
           Button Hover Effect
        ===================================== */

        .btn:hover {
            background-color: darkblue;
        }

    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color:red; text-align:center; margin-top:30px;">
        Community Event Portal
    </h1>

    <!-- Main Header -->
    <h2 id="mainHeader">
        Upcoming Events
    </h2>

    <!-- Event Card -->
    <div class="eventCard">

        <h3>Music Festival</h3>

        <p>
            Enjoy live music performances, food stalls,
            dance shows, and fun activities with friends.
        </p>

        <button class="btn">
            Register Now
        </button>

    </div>

    <!-- Event Card -->
    <div class="eventCard">

        <h3>Food Carnival</h3>

        <p>
            Taste delicious local foods and enjoy cultural
            celebrations with family and friends.
        </p>

        <button class="btn">
            Join Event
        </button>

    </div>

</body>
</html>
