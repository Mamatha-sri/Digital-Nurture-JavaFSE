<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap JavaScript Plugins</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">

    <style>
        body {
            background: #f4f7fc;
            font-family: Arial, sans-serif;
        }

        .custom-card {
            max-width: 600px;
            margin: 80px auto;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #0d6efd;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="card custom-card">
        <div class="card-body">

            <h1>Bootstrap JS Plugins</h1>

            <div class="alert alert-success alert-dismissible fade show" role="alert">
                <strong>Success!</strong> Bootstrap JavaScript plugins are loaded successfully.
            </div>

        </div>
    </div>

    <!-- Bootstrap JavaScript Bundle -->
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
