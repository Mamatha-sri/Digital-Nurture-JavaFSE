<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Sidebar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
    
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3 d-none d-md-block bg-dark text-white p-4 vh-100">
            <h4>Dashboard</h4>
            <ul class="list-unstyled mt-4">
                <li class="mb-3">🏠 Home</li>
                <li class="mb-3">📅 Events</li>
                <li class="mb-3">👥 Members</li>
                <li class="mb-3">📊 Reports</li>
                <li class="mb-3">⚙ Settings</li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="col-md-9 p-4">
            <h2 class="text-primary">
                Community Event Portal
            </h2>

            <p>
                This is the main content area.
                The sidebar is hidden on mobile devices and
                visible on tablets and desktops.
            </p>
        </div>

    </div>

</div>

</body>
</html>
