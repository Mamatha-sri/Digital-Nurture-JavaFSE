<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display and Visibility Utilities</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center text-primary mb-4">
        Bootstrap Display & Visibility
    </h2>

    <!-- Hidden on Mobile, Visible on Medium+ -->
    <div class="d-none d-md-block bg-primary text-white p-4 rounded mb-3">
        This section is hidden on mobile and visible on tablets and desktops.
    </div>

    <!-- Visible only on Large Screens -->
    <div class="d-none d-lg-flex bg-success text-white p-4 rounded justify-content-center">
        This section uses d-lg-flex and appears only on large screens.
    </div>

</div>

</body>
</html>
