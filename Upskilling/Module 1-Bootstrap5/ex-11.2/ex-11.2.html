<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Object Layout</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-primary mb-4">
        Media Object Example
    </h2>

    <div class="d-flex border p-3 bg-white shadow-sm rounded">

        <!-- Image -->
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200"
             alt="Profile"
             class="rounded me-3"
             width="120">

        <!-- Content -->
        <div>
            <h4>Community Volunteer</h4>

            <p>
                Volunteers play an important role in organizing local events,
                supporting community activities, and helping citizens stay connected.
            </p>

            <button class="btn btn-primary">
                Read More
            </button>
        </div>

    </div>

</div>

</body>
</html>
