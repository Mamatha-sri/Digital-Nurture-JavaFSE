<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <h2 class="text-center text-primary mb-5">
        Community Event Dashboard
    </h2>

    <div class="row g-4">

        <!-- Total Events -->
        <div class="col-md-3">
            <div class="card bg-primary text-white text-center p-4">
                <h3>25</h3>
                <p>Total Events</p>
            </div>
        </div>

        <!-- Registrations -->
        <div class="col-md-3">
            <div class="card bg-success text-white text-center p-4">
                <h3>180</h3>
                <p>Registrations</p>
            </div>
        </div>

        <!-- Pending Requests -->
        <div class="col-md-3">
            <div class="card bg-warning text-dark text-center p-4">
                <h3>12</h3>
                <p>Pending Requests</p>
            </div>
        </div>

        <!-- Cancelled Events -->
        <div class="col-md-3">
            <div class="card bg-danger text-white text-center p-4">
                <h3>3</h3>
                <p>Cancelled Events</p>
            </div>
        </div>

    </div>

    <div class="mt-5 p-4 bg-info text-white rounded">
        <h4>Dashboard Summary</h4>
        <p>
            Monitor community events, registrations, requests,
            and event status using Bootstrap contextual colors.
        </p>
    </div>

</div>

</body>
</html>
