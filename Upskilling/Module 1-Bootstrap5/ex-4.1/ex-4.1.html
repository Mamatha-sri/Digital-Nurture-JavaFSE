<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Column Layout</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sidebar {
            background-color: #0d6efd;
            color: white;
            padding: 20px;
            min-height: 400px;
            border-radius: 10px;
        }

        .content {
            background-color: #f8f9fa;
            padding: 20px;
            min-height: 400px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <div class="container mt-5">

        <h2 class="text-center text-primary mb-4">
            Community Event Portal
        </h2>

        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-3">
                <div class="sidebar">
                    <h4>Sidebar</h4>
                    <ul class="list-unstyled">
                        <li>🏠 Home</li>
                        <li>📅 Events</li>
                        <li>🖼 Gallery</li>
                        <li>📞 Contact</li>
                    </ul>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9">
                <div class="content">
                    <h3>Upcoming Community Events</h3>

                    <p>
                        Welcome to the Local Community Event Portal.
                        Stay updated with cultural festivals,
                        workshops, sports events, and community activities.
                    </p>

                    <button class="btn btn-primary">
                        View Events
                    </button>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
