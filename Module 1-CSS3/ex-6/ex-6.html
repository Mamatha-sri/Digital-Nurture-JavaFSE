<!DOCTYPE html>
<html>
<head>
    <title>Link and List Styling</title>
    <style>

        /* =====================================
           Body Styling
        ===================================== */
        body {
            background-image: url("https://images.unsplash.com/photo-1529156069898-49953e39b3ac?q=80&w=1600&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* =====================================
           Main Container
        ===================================== */
        .container {
            background-color: rgba(255,255,255,0.9);
            width: 80%;
            margin: auto;
            padding: 25px;
            border-radius: 12px;
        }

        /* =====================================
           Navigation Menu
           Remove Bullets
        ===================================== */
        .navMenu {
            list-style-type: none;
            padding: 0;
            margin: 20px 0;
            text-align: center;
        }

        .navMenu li {
            display: inline-block;
            margin: 10px;
            padding: 10px 15px;
            background-color: #e6f2ff;
            border-radius: 5px;
        }

        /* =====================================
           Link Styling
        ===================================== */

        /* Unvisited Link */
        a:link {
            color: blue;
            text-decoration: none;
        }

        /* Visited Link */
        a:visited {
            color: purple;
        }

        /* Mouse Hover */
        a:hover {
            color: red;
            text-decoration: underline;
        }

        /* Active Link */
        a:active {
            color: green;
        }

        /* =====================================
           Event List Styling
        ===================================== */
        .eventList {
            list-style-type: square;
            list-style-position: inside;
        }

        .eventList li {
            margin: 10px 0;
            padding: 8px;
        }

        /* =====================================
           Heading Styling
        ===================================== */
        h1 {
            text-align: center;
            color: navy;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Local Community Event Portal</h1>

        <!-- Navigation Menu -->
        <ul class="navMenu">
            <li><a href="#">Home</a></li>
            <li><a href="#">Events</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

        <h2>Upcoming Events</h2>

        <!-- Styled List -->
        <ul class="eventList">
            <li>Community Music Festival</li>
            <li>Food Carnival</li>
            <li>Sports Meet</li>
            <li>Art & Craft Exhibition</li>
        </ul>

    </div>

</body>
</html>
