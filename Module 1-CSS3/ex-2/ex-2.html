<!DOCTYPE html>
<html>
<head>
    <title>CSS Syntax and Comments</title>

    <!-- Internal CSS -->
    <style>

        /* =====================================
           Body Styling with Community Event Background
        ===================================== */

        body {
            background-color: #f4f8fc;

            /* Community Event Background Image */
            background-image: url("https://images.unsplash.com/photo-1529156069898-49953e39b3ac?q=80&w=1600&auto=format&fit=crop");

            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }


        /* =====================================
           Main Container Styling
        ===================================== */

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            width: 85%;
            margin: 40px auto;
            padding: 30px;
            border-radius: 12px;
        }


        /* =====================================
           Main Heading Styling
        ===================================== */

        h1 {
            text-align: center;
            color: darkblue;
            margin-bottom: 30px;
        }


        /* =====================================
           Style for Main CTA Button
        ===================================== */

        .cta-button {
            background-color: #007BFF;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }


        /* =====================================
           Hover Effect for Button
        ===================================== */

        .cta-button:hover {
            background-color: #0056b3;
        }


        /* =====================================
           Event Card Styling
        ===================================== */

        .eventCard {

            /* Event Celebration Background */
            background-image: url("https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=1200&auto=format&fit=crop");

            background-size: cover;
            background-position: center;

            color: white;
            padding: 30px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }


        /* =====================================
           Event Title Styling
        ===================================== */

        .eventCard h3 {
            font-size: 28px;
        }


        /* =====================================
           Event Description Styling
        ===================================== */

        .eventCard p {
            font-size: 16px;
            line-height: 1.6;
        }


        /* =====================================
           Footer Styling
        ===================================== */

        .footer {
            background-color: rgba(0,0,0,0.8);
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
            border-radius: 8px;
        }

    </style>

</head>

<body>

    <div class="container">

        <!-- Inline CSS Example -->
        <h1 style="color:red;">
            Local Community Event Portal
        </h1>

        <!-- Event Card -->
        <div class="eventCard">

            <h3>Community Music Festival</h3>

            <p>
                Enjoy live music performances, cultural celebrations,
                food stalls, dance shows, and fun activities with friends
                and family members.
            </p>

            <button class="cta-button">
                Register Now
            </button>

        </div>

        <!-- Footer -->
        <div class="footer">
            © 2026 Local Community Event Portal
        </div>

    </div>

</body>
</html>
